name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    name: Compile & upload release binaries
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - uses: docker/setup-buildx-action@v3
    - id: program_version
      uses: orbit-online/program-version@v1
    - name: Cache xgo-cache
      uses: actions/cache@v4
      with:
        path: /home/runner/.xgo-cache
        key: xgo-cache
    - name: Install techknowlogick/xgo
      run: go install src.techknowlogick.com/xgo@v1.8.0+1.23.2
    - name: Build mdns-svc
      run: |
        mkdir -p release/github.com/orbit-online/
        for arch in amd64 arm64 386; do
          CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build --ldflags="-X main.VERSION=${{ steps.program_version.outputs.version }}" -o release/github.com/orbit-online/mdns-svc-linux-${arch}
        done
        for arch in amd64 arm64; do
          GOOS=darwin GOARCH=$arch go build --ldflags="-X main.VERSION=${{ steps.program_version.outputs.version }}" -o release/github.com/orbit-online/mdns-svc-darwin-${arch}
        done
        xgo --dest release --targets=darwin/arm64,darwin/amd64,darwin/386 --ldflags="-X main.VERSION=${{ steps.program_version.outputs.version }}" .
        xgo --dest release --targets=windows/amd64,windows/386 --ldflags="-X main.VERSION=${{ steps.program_version.outputs.version }} -H windowsgui" .
    - id: release
      uses: orbit-online/git-release@v1
    - uses: ncipollo/release-action@v1
      with:
        name: ${{ steps.program_version.outputs.version }}
        body: ${{ steps.release.outputs.message }}
        draft: false
        prerelease: false
        artifacts: release/github.com/orbit-online/*
        artifactErrorsFailBuild: true
        artifactContentType: application/octet-stream
